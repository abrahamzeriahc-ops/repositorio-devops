name: Mi Pipeline CI/CD Final

on:
  push:
    branches: [ "main" ]

# Esto silencia la advertencia de Node.js que te aparece en amarillo
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          # Quitamos el "app/" porque el archivo está en la raíz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build Docker Image
        run: |
          # Usamos -f DockerFile porque así se llama tu archivo en la captura
          docker build -t mi-app-web -f DockerFile .