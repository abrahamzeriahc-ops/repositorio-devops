name: Mi Pipeline CI/CD corregido

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Descargar el código (Actualizado a v4)
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Paso 2: Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # Paso 3: Instalar dependencias
      - name: Instalar dependencias
        run: |
          pip install -r app/requirements.txt

      # Paso 4: Construir la imagen de Docker (Validación)
      - name: Build Docker Image
        run: |
          docker build -t mi-app-web ./app